<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 3D Commander</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Split layout ────────────────────────── */
    .app-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
    }

    /* ── 3D Panel (left) ─────────────────────── */
    .scene-panel {
      position: relative;
      background: #0a0a1a;
      overflow: hidden;
    }
    #scene-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Scene overlay */
    .scene-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }
    .overlay-badge {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .overlay-badge .accent { color: #4fc3f7; }
    .overlay-badge .count { color: #ff9800; font-weight: bold; }

    /* ── Chat Panel (right) ──────────────────── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      background: #111118;
      border-left: 1px solid #2a2a3a;
    }

    /* Chat header */
    .chat-header {
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3a;
    }
    .chat-header h1 {
      font-size: 16px;
      color: #4fc3f7;
      margin-bottom: 8px;
    }
    .chat-header-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #model-select {
      flex: 1;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 12px;
      font-family: inherit;
    }
    #model-select:focus { outline: none; border-color: #4fc3f7; }
    #load-btn {
      padding: 6px 14px;
      background: #ff9800;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #load-btn:hover:not(:disabled) { background: #ffa726; }
    #load-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status & progress */
    #status {
      padding: 6px 16px;
      font-size: 11px;
      color: #777;
      background: #0f0f15;
      border-bottom: 1px solid #222;
    }
    #progress {
      padding: 4px 16px 6px;
      background: #0f0f15;
      display: none;
    }
    .progress-track {
      background: #222;
      border-radius: 3px;
      overflow: hidden;
      height: 18px;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4fc3f7, #29b6f6);
      width: 0%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: #000;
    }

    /* Chat messages */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      max-width: 95%;
    }
    .message .label {
      display: block;
      font-size: 10px;
      font-weight: bold;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .message.user {
      align-self: flex-end;
      background: #1a3a5c;
      border: 1px solid #2a5a8c;
    }
    .message.user .label { color: #4fc3f7; }

    .message.assistant {
      align-self: flex-start;
      background: #1a2e1a;
      border: 1px solid #2a5c2a;
    }
    .message.assistant .label { color: #66bb6a; }

    .message.system {
      align-self: center;
      background: #2a2a2a;
      border: 1px solid #444;
      font-size: 11px;
      color: #999;
    }
    .message.system .label { color: #ff9800; }

    /* Command feedback */
    .cmd-feedback {
      padding: 6px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .cmd-result {
      background: rgba(79, 195, 247, 0.15);
      color: #4fc3f7;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      border: 1px solid rgba(79, 195, 247, 0.2);
    }

    /* Input area */
    .input-area {
      padding: 10px 12px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a3a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 40px;
      max-height: 100px;
    }
    #user-input:focus { outline: none; border-color: #4fc3f7; }
    #user-input:disabled { opacity: 0.4; }
    #send-btn {
      padding: 8px 16px;
      background: #4fc3f7;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    #send-btn:hover:not(:disabled) { background: #29b6f6; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 800px) {
      .app-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 40vh 1fr;
      }
      .chat-panel {
        border-left: none;
        border-top: 1px solid #2a2a3a;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/3d-ai-scene-Bsfgpw1l.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/index-CQhXRJdD.js">
</head>
<body>
  <div class="app-layout">
    <!-- 3D Scene -->
    <div class="scene-panel">
      <canvas id="scene-canvas"></canvas>
      <div class="scene-overlay">
        <div class="overlay-badge">
          <span class="accent">AI 3D Commander</span>
        </div>
        <div class="overlay-badge">
          Objects: <span class="count" id="object-count">0</span>
          &nbsp;|&nbsp; Drag to rotate, Scroll to zoom
        </div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-header">
        <h1>AI 3D Commander</h1>
        <div class="chat-header-controls">
          <select id="model-select"></select>
          <button id="load-btn">Load</button>
        </div>
      </div>

      <div id="status">Initializing...</div>

      <div id="progress">
        <div class="progress-track">
          <div id="progress-bar">0%</div>
        </div>
      </div>

      <div id="chat-messages"></div>

      <div class="input-area">
        <textarea id="user-input" placeholder="Try: 빨간 공을 만들어" disabled rows="1"></textarea>
        <button id="send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

</body>
</html>
