<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebLLM Test — 브라우저에서 LLM 실행</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 헤더 ────────────────────────────────── */
    header {
      padding: 12px 24px;
      background: #1a1a2e;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      color: #4fc3f7;
      white-space: nowrap;
    }
    #status {
      font-size: 13px;
      color: #999;
      flex: 1;
    }

    /* ── GPU 상태 ─────────────────────────────── */
    #gpu-info {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .gpu-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .gpu-dot.active { background: #66bb6a; box-shadow: 0 0 6px #66bb6a88; }
    .gpu-dot.inactive { background: #f44336; box-shadow: 0 0 6px #f4433688; }
    .gpu-dot.checking { background: #ff9800; animation: pulse 1s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #gpu-label { color: #888; }
    #gpu-detail { color: #4fc3f7; }

    /* ── 모델 선택 바 ────────────────────────── */
    .model-bar {
      padding: 10px 24px;
      background: #151520;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .model-bar label {
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
    }
    #model-select {
      flex: 1;
      min-width: 200px;
      max-width: 500px;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
    }
    #model-select:focus {
      outline: none;
      border-color: #4fc3f7;
    }
    #load-btn {
      padding: 8px 16px;
      background: #ff9800;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #load-btn:hover:not(:disabled) {
      background: #ffa726;
    }
    #load-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #model-desc {
      width: 100%;
      font-size: 12px;
      color: #777;
      padding-top: 2px;
    }

    /* ── 프로그레스 바 ────────────────────────── */
    #progress {
      padding: 8px 24px;
      background: #111;
      display: none;
      flex-shrink: 0;
    }
    .progress-track {
      background: #222;
      border-radius: 4px;
      overflow: hidden;
      height: 24px;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4fc3f7, #29b6f6);
      width: 0%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #000;
    }

    /* ── 모델 정보 ────────────────────────────── */
    #model-info {
      padding: 6px 24px;
      background: #111;
      font-size: 12px;
      color: #666;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    /* ── 채팅 영역 ────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message .label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .message.user {
      align-self: flex-end;
      background: #1a3a5c;
      border: 1px solid #2a5a8c;
    }
    .message.user .label { color: #4fc3f7; }

    .message.assistant {
      align-self: flex-start;
      background: #1a2e1a;
      border: 1px solid #2a5c2a;
    }
    .message.assistant .label { color: #66bb6a; }

    .message.system {
      align-self: center;
      background: #2a2a2a;
      border: 1px solid #444;
      font-size: 12px;
      color: #999;
    }
    .message.system .label { color: #ff9800; }

    /* ── 입력 영역 ────────────────────────────── */
    .input-area {
      padding: 12px 24px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #e0e0e0;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    #user-input:focus {
      outline: none;
      border-color: #4fc3f7;
    }
    #user-input:disabled {
      opacity: 0.4;
    }
    #send-btn {
      padding: 10px 20px;
      background: #4fc3f7;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) {
      background: #29b6f6;
    }
    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── 스크롤바 ─────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>WebLLM Test</h1>
    <div id="status">초기화 중...</div>
    <div id="gpu-info">
      <span class="gpu-dot checking"></span>
      <span id="gpu-label">WebGPU:</span>
      <span id="gpu-detail">확인 중...</span>
    </div>
  </header>

  <div class="model-bar">
    <label for="model-select">모델:</label>
    <select id="model-select"></select>
    <button id="load-btn">모델 로드</button>
    <div id="model-desc"></div>
  </div>

  <div id="progress">
    <div class="progress-track">
      <div id="progress-bar">0%</div>
    </div>
  </div>

  <div id="model-info">모델을 선택하고 "모델 로드" 버튼을 누르세요</div>

  <div id="chat-messages"></div>

  <div class="input-area">
    <textarea id="user-input" placeholder="메시지를 입력하세요... (Enter로 전송, Shift+Enter로 줄바꿈)" disabled rows="1"></textarea>
    <button id="send-btn" disabled>전송</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
